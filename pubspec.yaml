name: carduz
description: "A new Flutter project."

publish_to: 'none'



version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  mask_text_input_formatter: ^2.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  intl_utils: ^2.8.14

flutter:

  uses-material-design: true

  
  assets:
    - assets/icons/

flutter_intl:
  enabled: true
  main_locale: uz
  arb_dir: lib/src/common/l10n
  output_dir: lib/src/common/l10n/generated